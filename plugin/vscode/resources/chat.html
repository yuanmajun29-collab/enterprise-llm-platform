<!-- Enterprise LLM Assistant - Chat UI (Standalone HTML)
     注意：此文件仅作为独立的聊天界面模板备用。
     实际 Webview HTML 由 ChatPanelView 内联生成。 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'none';
        style-src 'unsafe-inline';
        script-src 'unsafe-inline';
        img-src https: data:;
    ">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            color: var(--vscode-editor-foreground, #ccc);
            background: var(--vscode-editor-background, #1e1e1e);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid var(--vscode-panel-border, #444);
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .model-selector label {
            font-size: 12px;
            opacity: 0.7;
        }

        .model-selector select {
            padding: 4px 8px;
            border: 1px solid var(--vscode-input-border, #555);
            border-radius: 4px;
            background: var(--vscode-input-background, #313131);
            color: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        .actions { display: flex; gap: 4px; }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: 1px solid var(--vscode-panel-border, #444);
            border-radius: 4px;
            background: transparent;
            color: inherit;
            cursor: pointer;
            transition: background 0.2s;
        }
        .icon-btn:hover { background: var(--vscode-button-hoverBackground, #2a2d2e); }

        /* 消息区域 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }

        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .message.user .message-bubble {
            background: var(--vscode-button-background, #0e639c);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.assistant .message-bubble {
            background: var(--vscode-input-background, #313131);
            border: 1px solid var(--vscode-panel-border, #444);
            border-bottom-left-radius: 2px;
        }

        .message-bubble pre {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }
        .message-bubble code {
            font-family: var(--vscode-editor-font-family, monospace);
            font-size: 13px;
            padding: 1px 4px;
            border-radius: 3px;
            background: rgba(0,0,0,0.15);
        }
        .message-bubble pre code { background: none; padding: 0; }
        .message-bubble strong { font-weight: 600; }

        .message-meta {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 4px;
        }

        .typing-cursor::after {
            content: '▊';
            animation: blink 1s infinite;
            color: var(--vscode-button-background, #0e639c);
        }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            opacity: 0.5;
            text-align: center;
        }
        .empty-state h3 { margin-bottom: 8px; font-size: 18px; }
        .empty-state p { font-size: 13px; }

        /* 输入区域 */
        .input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            border-top: 1px solid var(--vscode-panel-border, #444);
        }

        #message-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--vscode-input-border, #555);
            border-radius: 6px;
            background: var(--vscode-input-background, #313131);
            color: inherit;
            font-family: inherit;
            font-size: 13px;
            resize: none;
            min-height: 40px;
            max-height: 120px;
        }
        #message-input:focus { outline: none; border-color: var(--vscode-button-background, #0e639c); }
        #message-input::placeholder { color: var(--vscode-input-placeholderForeground, #888); }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: white;
        }

        .btn-send { background: var(--vscode-button-background, #0e639c); }
        .btn-send:hover:not(:disabled) { opacity: 0.9; }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-stop { background: #d32f2f; display: none; }
        .btn-stop:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div class="model-selector">
            <label for="model-select">模型:</label>
            <select id="model-select">
                <option value="Qwen-72B-Chat">Qwen 72B Chat</option>
                <option value="Qwen-14B-Chat">Qwen 14B Chat</option>
                <option value="DeepSeek-Coder-33B">DeepSeek Coder 33B</option>
                <option value="Llama-3-70B-Instruct">Llama 3 70B</option>
            </select>
        </div>
        <div class="actions">
            <button id="clear-btn" class="icon-btn" title="清空对话">🗑</button>
            <button id="export-btn" class="icon-btn" title="导出对话">💾</button>
        </div>
    </div>

    <!-- 消息列表 -->
    <div class="messages" id="messages">
        <div class="empty-state" id="empty-state">
            <h3>🤖 企业大模型助手</h3>
            <p>输入消息开始对话</p>
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
        <textarea id="message-input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="2"></textarea>
        <button id="send-btn" class="btn btn-send" disabled>发送</button>
        <button id="stop-btn" class="btn btn-stop">停止</button>
    </div>

    <script>
        // 使用 VSCode Webview API 与 extension 通信
        (function() {
            const vscode = acquireVsCodeApi();
            const messagesDiv = document.getElementById('messages');
            const emptyState = document.getElementById('empty-state');
            const input = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const stopBtn = document.getElementById('stop-btn');
            const clearBtn = document.getElementById('clear-btn');
            const exportBtn = document.getElementById('export-btn');
            const modelSelect = document.getElementById('model-select');

            let isGenerating = false;

            // 监听来自 extension 的消息
            window.addEventListener('message', event => {
                const msg = event.data;
                switch (msg.type) {
                    case 'init':
                        modelSelect.value = msg.session.model || 'Qwen-72B-Chat';
                        if (msg.session.messages && msg.session.messages.length > 0) {
                            emptyState.style.display = 'none';
                            msg.session.messages.forEach(m => renderMessage(m));
                        }
                        break;

                    case 'message':
                        emptyState.style.display = 'none';
                        renderMessage(msg.message);
                        break;

                    case 'stream-update':
                        updateStreamingMessage(msg.messageId, msg.content);
                        break;

                    case 'stream-complete':
                        finalizeStreamingMessage(msg.messageId, msg.content);
                        break;

                    case 'generating':
                        isGenerating = msg.value;
                        updateUI();
                        break;

                    case 'error':
                        showError(msg.message);
                        break;

                    case 'cleared':
                        messagesDiv.innerHTML = '';
                        emptyState.style.display = 'flex';
                        break;

                    case 'history':
                        messagesDiv.innerHTML = '';
                        if (msg.messages.length > 0) {
                            emptyState.style.display = 'none';
                            msg.messages.forEach(m => renderMessage(m));
                        } else {
                            emptyState.style.display = 'flex';
                        }
                        break;
                }
            });

            // 渲染消息
            function renderMessage(message) {
                const el = document.createElement('div');
                el.className = 'message ' + message.type;
                el.id = message.id;

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';

                if (message.isStreaming) {
                    bubble.classList.add('typing-cursor');
                }

                if (message.type === 'assistant') {
                    bubble.innerHTML = formatMarkdown(message.content || '');
                } else {
                    bubble.textContent = message.content;
                }

                el.appendChild(bubble);

                const meta = document.createElement('div');
                meta.className = 'message-meta';
                meta.textContent = new Date(message.timestamp).toLocaleTimeString() +
                    (message.model ? ' · ' + message.model : '');
                el.appendChild(meta);

                messagesDiv.appendChild(el);
                scrollToBottom();
            }

            // 流式更新消息内容
            function updateStreamingMessage(messageId, content) {
                const el = document.getElementById(messageId);
                if (!el) return;
                const bubble = el.querySelector('.message-bubble');
                if (bubble) {
                    bubble.innerHTML = formatMarkdown(content);
                    bubble.classList.add('typing-cursor');
                }
                scrollToBottom();
            }

            // 流式完成
            function finalizeStreamingMessage(messageId, content) {
                const el = document.getElementById(messageId);
                if (!el) return;
                const bubble = el.querySelector('.message-bubble');
                if (bubble) {
                    bubble.innerHTML = formatMarkdown(content);
                    bubble.classList.remove('typing-cursor');
                }
            }

            // 简易 Markdown 格式化
            function formatMarkdown(text) {
                if (!text) return '';
                text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
                text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
                text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                text = text.replace(/\n/g, '<br>');
                return text;
            }

            function showError(errorMsg) {
                const el = document.createElement('div');
                el.className = 'message assistant';
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                bubble.style.color = '#f44336';
                bubble.textContent = '❌ ' + errorMsg;
                el.appendChild(bubble);
                messagesDiv.appendChild(el);
                scrollToBottom();
            }

            function updateUI() {
                sendBtn.style.display = isGenerating ? 'none' : '';
                stopBtn.style.display = isGenerating ? '' : 'none';
                sendBtn.disabled = !input.value.trim();
            }

            function sendMessage() {
                const content = input.value.trim();
                if (!content || isGenerating) return;

                vscode.postMessage({ type: 'sendMessage', content: content });
                input.value = '';
                input.style.height = 'auto';
                updateUI();
            }

            // 事件绑定
            sendBtn.addEventListener('click', sendMessage);

            stopBtn.addEventListener('click', () => {
                vscode.postMessage({ type: 'stopGeneration' });
            });

            clearBtn.addEventListener('click', () => {
                if (confirm('确定要清空所有对话吗？')) {
                    vscode.postMessage({ type: 'clearHistory' });
                }
            });

            exportBtn.addEventListener('click', () => {
                vscode.postMessage({ type: 'export' });
            });

            modelSelect.addEventListener('change', () => {
                vscode.postMessage({ type: 'modelChange', model: modelSelect.value });
            });

            input.addEventListener('input', () => {
                updateUI();
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 120) + 'px';
            });

            input.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            input.focus();
            updateUI();

            function scrollToBottom() {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        })();
    </script>
</body>
</html>
