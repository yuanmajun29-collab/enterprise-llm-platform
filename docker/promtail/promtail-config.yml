server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ========================================
  # vLLM 推理服务日志
  # ========================================
  - job_name: vllm-inference
    static_configs:
      - targets:
          - localhost
        labels:
          job: vllm-inference
          __path__: /app/logs/vllm/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: time
            message: message
            request_id: request_id
            model: model
            latency: latency

      - labels:
          level:
          request_id:
          model:

  # ========================================
  # API Gateway (Kong) 日志
  # ========================================
  - job_name: kong-gateway
    static_configs:
      - targets:
          - localhost
        labels:
          job: kong-gateway
          __path__: /var/log/kong/*.log

    pipeline_stages:
      - regex:
          expression: '(?P<method>\w+)\s+(?P<path>\S+)\s+HTTP/(?P<version>[\d.]+)'

      - labels:
          method:
          path:

  # ========================================
  # Keycloak 认证日志
  # ========================================
  - job_name: keycloak
    static_configs:
      - targets:
          - localhost
        labels:
          job: keycloak
          __path__: /var/log/keycloak/*.log

    pipeline_stages:
      - regex:
          expression: 'user=(?P<user>\S+)'

      - labels:
          user:

  # ========================================
  # 应用日志
  # ========================================
  - job_name: llm-platform
    static_configs:
      - targets:
          - localhost
        labels:
          job: llm-platform
          __path__: /app/logs/application/*.log

    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}'
          max_wait_time: 3s

      - regex:
          expression: '^\[(?P<level>\w+)\]\s+(?P<logger>\S+)\s+-\s+(?P<message>.*)$'

      - labels:
          level:
          logger:

  # ========================================
  # 容器日志
  # ========================================
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'

      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'

      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
