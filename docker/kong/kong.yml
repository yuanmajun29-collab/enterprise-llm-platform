_format_version: "3.0"

services:
  # 大模型推理服务
  - name: vllm-inference-service
    url: http://vllm-inference:8000
    routes:
      - name: llm-chat-completions
        paths:
          - /v1/chat/completions
        methods:
          - POST
        strip_path: false
        plugins:
          - name: jwt
          - name: rate-limiting
            config:
              minute: 60
              hour: 1000
              policy: redis
              redis_host: redis
              redis_port: 6379
              redis_password: ${REDIS_PASSWORD}
          - name: request-transformer
            config:
              add:
                headers:
                  - X-Request-ID:$(uuid)

      - name: llm-completions
        paths:
          - /v1/completions
        methods:
          - POST
        strip_path: false
        plugins:
          - name: jwt
          - name: rate-limiting
            config:
              minute: 60
              hour: 1000
              policy: redis
              redis_host: redis
              redis_port: 6379
              redis_password: ${REDIS_PASSWORD}

      - name: llm-models
        paths:
          - /v1/models
        methods:
          - GET
        strip_path: false
        plugins:
          - name: jwt

      - name: llm-embeddings
        paths:
          - /v1/embeddings
        methods:
          - POST
        strip_path: false
        plugins:
          - name: jwt
          - name: rate-limiting
            config:
              minute: 30
              hour: 500

  # 健康检查服务
  - name: health-check-service
    url: http://vllm-inference:8000
    routes:
      - name: health-check
        paths:
          - /health
        methods:
          - GET
        strip_path: false

  # Keycloak 联合
  - name: keycloak-service
    url: http://keycloak:8080
    routes:
      - name: keycloak-proxy
        paths:
          - /auth/*
        strip_path: false

plugins:
  # CORS 支持
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - X-Request-ID
      exposed_headers:
        - X-Request-ID
      max_age: 3600
      credentials: true

  # 请求体大小限制
  - name: request-size-limiting
    config:
      allowed_payload_size: 10

  # 响应转换 - 添加安全头
  - name: response-transformer
    config:
      add:
        headers:
          - X-Content-Type-Options:nosniff
          - X-Frame-Options:DENY
          - X-XSS-Protection:1; mode=block

upstreams:
  - name: vllm-upstream
    algorithm: round-robin
    slots: 10
    healthchecks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
          tcp_failures: 3
          timeouts: 3
